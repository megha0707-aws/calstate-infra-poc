name: Terraform Auto Deploy POC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init

      - name: Import existing resource groups
        run: |
          terraform import azurerm_resource_group.dev /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/Grouper-Dev || true
          terraform import azurerm_resource_group.prod /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/Grouper-Prod || true
          terraform import azurerm_resource_group.hub /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/Grouper-Hub || true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="poc.tfvars"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="poc.tfvars"
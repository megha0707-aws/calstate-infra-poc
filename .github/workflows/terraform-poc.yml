name: Terraform Auto Deploy POC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "714a21d1-03b1-40a3-9031-bb20ae75c89d",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "91ea5a42-5e9b-4c0c-a766-ea2a2aaa3ace",
              "tenantId": "cc590aa0-82d1-4810-8052-03fcd2d71ae5"
            }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="poc.tfvars"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="poc.tfvars"